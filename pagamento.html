<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro | Tucano Store</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Anderson2706/TUCANO-STORE/refs/heads/main/IMG_7387.PNG">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --ios-blue: #1E5BFF; 
            --bg: #000000; 
            --br-verde: #00ff5d;
            --br-amarelo: #ffea00;
            --br-azul: #0051ff;
        }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        #snow-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 0; opacity: 0.3; }
        .glass-header { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(255,255,255,0.1); position: fixed; top: 0; width: 100%; z-index: 100; }
        
        .br-glow-border {
            position: relative;
            background: #080808;
            border-radius: 28px;
            padding: 3px;
            overflow: hidden;
            z-index: 1;
        }
        .br-glow-border::before {
            content: "";
            position: absolute;
            z-index: -2;
            left: -50%; top: -50%; width: 200%; height: 200%;
            background-image: conic-gradient(transparent, var(--br-verde), var(--br-amarelo), var(--br-azul), var(--br-verde), transparent 70%);
            animation: rotateBr 3s linear infinite;
        }
        .br-glow-border::after {
            content: "";
            position: absolute;
            inset: 3px;
            background: #0d0d0d;
            border-radius: 25px;
            z-index: -1;
        }
        @keyframes rotateBr { 100% { transform: rotate(1turn); } }
        .btn-pay {
            background: linear-gradient(90deg, var(--br-verde), var(--br-azul));
            transition: 0.4s;
            font-weight: 900;
            box-shadow: 0 10px 20px rgba(0, 255, 93, 0.2);
        }
        .btn-pay:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(0, 255, 93, 0.4); }
        main { position: relative; z-index: 1; }
    </style>
</head>
<body class="pt-32 pb-20">
    <canvas id="snow-canvas"></canvas>
    <header class="glass-header px-6 py-5">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
                <img src="https://raw.githubusercontent.com/Anderson2706/TUCANO-STORE/refs/heads/main/IMG_7387.PNG" class="w-10 h-10 rounded-lg">
                <span class="font-black text-xl italic tracking-tighter">TUCANO STORE</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="bi bi-shield-lock-fill text-br-verde"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Ambiente Seguro</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6">
        <div id="checkout-screen" class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="space-y-8">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Resumo do Pedido</h2>
                <div class="br-glow-border">
                    <div class="p-6 flex items-center gap-6">
                        <img id="p-img" src="" class="w-28 h-28 object-cover rounded-2xl">
                        <div class="flex-1">
                            <h3 id="p-title" class="font-bold text-white uppercase text-lg mb-1 italic">Carregando...</h3>
                            <span id="p-cat" class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-black uppercase">Streaming</span>
                        </div>
                    </div>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-[32px] p-8 space-y-6">
                    <div class="space-y-4">
                        <label class="block text-xs font-black uppercase text-gray-500 tracking-widest">Informações de Entrega</label>
                        <input type="email" id="customer-email" placeholder="Digite seu melhor e-mail" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl outline-none focus:border-br-verde transition">
                        <input type="tel" id="customer-phone" placeholder="WhatsApp (DDD) 99999-9999" class="w-full bg-black/40 border border-white/10 p-5 rounded-2xl outline-none focus:border-br-verde transition">
                    </div>
                    <div class="p-5 bg-br-verde/5 border border-br-verde/20 rounded-2xl flex gap-4 items-center">
                        <i class="bi bi-info-circle-fill text-br-verde text-xl"></i>
                        <p class="text-xs text-gray-300 leading-relaxed">
                            <strong class="text-white">Atenção:</strong> O acesso será enviado para o seu <span class="text-br-verde">E-mail</span> e <span class="text-br-verde">WhatsApp</span> após a confirmação.
                        </p>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Pagamento</h2>
                <div class="bg-[#0a0a0a] border border-white/10 rounded-[40px] p-10 space-y-8">
                    <div class="space-y-4">
                        <div class="flex justify-between text-gray-400">
                            <span class="font-bold">Subtotal</span>
                            <span id="subtotal">R$ 0,00</span>
                        </div>
                        <div class="flex justify-between text-br-verde font-bold">
                            <span>Desconto Especial (PIX 5%)</span>
                            <span id="desconto">- R$ 0,00</span>
                        </div>
                        <div class="h-[1px] bg-white/10 w-full"></div>
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-black uppercase italic">Total a Pagar</span>
                            <span class="text-4xl font-black text-white" id="total-final">R$ 0,00</span>
                        </div>
                    </div>
                    <button onclick="generatePix()" class="btn-pay w-full py-6 rounded-2xl flex items-center justify-center gap-3 shadow-2xl text-lg italic text-black">
                        <i class="bi bi-qr-code-scan"></i> GERAR PIX AGORA
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentProduct = null;
        let variationIdx = 0;

        async function init() {
            const id = localStorage.getItem('id_selecionado');
            variationIdx = localStorage.getItem('variacao_selecionada') || 0;

            if(!id) { location.href = 'index.html'; return; }

            const r = await fetch('produtos.json');
            const data = await r.json();
            currentProduct = data.find(p => p.id == id);

            if(currentProduct) {
                const variacao = currentProduct.variacoes[variationIdx];
                const precoBase = variacao.preco;
                const valorDesconto = precoBase * 0.05;
                const precoFinal = precoBase - valorDesconto;
                
                document.getElementById('p-title').innerText = `${currentProduct.titulo} (${variacao.nome})`;
                document.getElementById('p-img').src = currentProduct.imagem;
                document.getElementById('p-cat').innerText = currentProduct.categoria;
                document.getElementById('subtotal').innerText = `R$ ${precoBase.toFixed(2)}`;
                document.getElementById('desconto').innerText = `- R$ ${valorDesconto.toFixed(2)}`;
                document.getElementById('total-final').innerText = `R$ ${precoFinal.toFixed(2)}`;
            }
        }

        async function generatePix() {
            const email = document.getElementById('customer-email').value;
            const phone = document.getElementById('customer-phone').value;

            if(!email.includes('@') || phone.length < 8) {
                alert("Preencha os dados de entrega corretamente!");
                return;
            }

            const btn = document.querySelector('.btn-pay');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<i class="bi bi-hourglass-split animate-spin"></i> REDIRECIONANDO...';
            btn.disabled = true;

            const variacao = currentProduct.variacoes[variationIdx];

            // Verifica se o link existe no JSON
            if (variacao.link && variacao.link.trim() !== "") {
                // Redireciona para o link de checkout externo cadastrado no Admin
                window.location.href = variacao.link;
            } else {
                alert("Erro: Link de pagamento não configurado para este plano.");
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        // Neve
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.4;
                this.opacity = Math.random() * 0.2;
            }
            update() { this.y += this.speed; if (this.y > canvas.height) this.y = -10; }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.fill();
            }
        }
        function initSnow() { for (let i = 0; i < 40; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize(); initSnow(); animate();
        init();
    </script>
</body>
</html>
