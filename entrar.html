<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Entrar - Tucano Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles/global.css">
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass w-full max-w-md rounded-3xl p-8 text-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" class="w-8 mx-auto mb-4">
        <h2 class="text-2xl font-semibold mb-2">Fazer Login</h2>
        <p class="text-gray-400 mb-8">Use sua conta para continuar</p>

        <div id="accountsList" class="space-y-3 mb-6">
            </div>

        <button onclick="addNewAccount()" class="w-full flex items-center gap-3 p-4 border border-white/10 rounded-xl hover:bg-white/5 transition">
            <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="bi bi-person-plus"></i></div>
            <span class="font-medium text-sm">Usar outra conta</span>
        </button>
    </div>

    <script>
        function loadAccounts() {
            const accounts = JSON.parse(localStorage.getItem('tucano_accounts') || '[]');
            const list = document.getElementById('accountsList');
            list.innerHTML = accounts.map(acc => `
                <button onclick="loginAs('${acc.email}')" class="w-full flex items-center gap-3 p-3 border border-white/10 rounded-xl hover:bg-white/5 transition">
                    <img src="https://ui-avatars.com/api/?name=${acc.name}&background=random" class="w-10 h-10 rounded-full">
                    <div class="text-left">
                        <p class="text-sm font-bold">${acc.name}</p>
                        <p class="text-xs text-gray-500">${acc.email}</p>
                    </div>
                </button>
            `).join('');
        }

        function addNewAccount() {
            const name = prompt("Seu Nome:");
            const email = prompt("Seu E-mail:");
            if (name && email) {
                const accounts = JSON.parse(localStorage.getItem('tucano_accounts') || '[]');
                accounts.push({ name, email });
                localStorage.setItem('tucano_accounts', JSON.stringify(accounts));
                loginAs(email);
            }
        }

        function loginAs(email) {
            const accounts = JSON.parse(localStorage.getItem('tucano_accounts'));
            const user = accounts.find(a => a.email === email);
            localStorage.setItem('tucano_logged_user', JSON.stringify(user));
            window.location.href = 'index.html';
        }

        loadAccounts();
    </script>
</body>
</html>
