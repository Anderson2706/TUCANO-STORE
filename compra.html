<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes | Tucano Store</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Anderson2706/TUCANO-STORE/refs/heads/main/IMG_7387.PNG">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --ios-blue: #1E5BFF; --bg: #000000; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-header { background: rgba(0, 0, 0, 0.85); backdrop-filter: saturate(180%) blur(20px); border-bottom: 0.5px solid rgba(255,255,255,0.1); position: fixed; top: 0; width: 100%; z-index: 100; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 32px; backdrop-filter: blur(25px); }
        .option-ios { background: rgba(255,255,255,0.02); border: 1.5px solid rgba(255,255,255,0.05); border-radius: 20px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-ios.active { border-color: var(--ios-blue); background: rgba(30, 91, 255, 0.15); box-shadow: 0 0 25px rgba(30, 91, 255, 0.2); }
        .option-ios.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .btn-disabled { background: #222 !important; color: #555 !important; cursor: not-allowed !important; transform: none !important; }
        .btn-main { background: #fff; color: #000; border-radius: 20px; font-weight: 900; transition: all 0.3s ease; }
        .btn-main:hover { transform: scale(1.02); background: #f3f3f3; }
        .btn-outline { border: 1.5px solid rgba(255,255,255,0.1); border-radius: 20px; transition: 0.3s; background: rgba(255,255,255,0.02); }
        .desc-content { line-height: 1.8; color: #ccc; font-size: 15px; }
        .animate-reveal { animation: fadeIn 0.7s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pt-28 pb-20 px-4">

    <header class="glass-header px-8 py-4">
        <div class="max-w-[1400px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
                <img src="https://raw.githubusercontent.com/Anderson2706/TUCANO-STORE/refs/heads/main/IMG_7387.PNG" class="w-10 h-10 rounded-xl">
                <span class="font-black text-lg tracking-tighter uppercase">TUCANO STORE</span>
            </div>
            <div class="flex items-center gap-5">
                <img src="https://ui-avatars.com/api/?name=User&background=1E5BFF&color=fff" class="w-9 h-9 rounded-full border border-white/10">
            </div>
        </div>
    </header>

    <main class="max-w-[850px] mx-auto space-y-6 animate-reveal">
        <div class="glass-card p-2 shadow-2xl overflow-hidden">
            <img id="m-img" class="w-full aspect-video object-cover rounded-[26px]">
        </div>

        <div class="glass-card p-8 border-t border-white/10">
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
                <div>
                    <span id="m-categoria" class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em] mb-3 block">Digital Premium Access</span>
                    <h1 id="m-titulo" class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white leading-none"></h1>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 min-w-[180px] text-center">
                    <span class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Preço Selecionado</span>
                    <span id="m-preco" class="text-3xl font-black text-white tracking-tight">R$ 0,00</span>
                </div>
            </div>

            <div class="space-y-4 mb-10">
                <div class="flex items-center justify-between px-1">
                    <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Planos Disponíveis</label>
                    <div class="flex items-center gap-2">
                        <span id="stock-dot" class="w-2 h-2 rounded-full"></span>
                        <span id="m-estoque-topo" class="text-[10px] font-black uppercase"></span>
                    </div>
                </div>
                <div id="v-box" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="action-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4">
                <div class="glass-card p-5 flex items-center gap-4 border-none bg-white/5">
                    <div class="w-12 h-12 bg-yellow-500/10 rounded-2xl flex items-center justify-center text-yellow-500 text-2xl"><i class="bi bi-lightning-charge-fill"></i></div>
                    <div>
                        <h4 class="text-[11px] font-black uppercase text-white tracking-widest">Entrega</h4>
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Imediata via E-mail</p>
                    </div>
                </div>
                <div class="glass-card p-5 flex items-center gap-4 border-none bg-white/5">
                    <div class="w-12 h-12 bg-blue-500/10 rounded-2xl flex items-center justify-center text-blue-500 text-2xl"><i class="bi bi-shield-lock-fill"></i></div>
                    <div>
                        <h4 class="text-[11px] font-black uppercase text-white tracking-widest">Segurança</h4>
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Acesso Garantido</p>
                    </div>
                </div>
                <div class="glass-card p-5 flex items-center gap-4 border-none bg-white/5">
                    <div class="w-12 h-12 bg-green-500/10 rounded-2xl flex items-center justify-center text-green-500 text-2xl"><i class="bi bi-qr-code"></i></div>
                    <div>
                        <h4 class="text-[11px] font-black uppercase text-white tracking-widest">Pix</h4>
                        <p class="text-[10px] font-bold text-gray-500 uppercase">Aprovação Automática</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card p-10">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500 text-2xl"><i class="bi bi-card-text"></i></div>
                <div>
                    <h3 class="font-black uppercase tracking-widest text-sm text-white">Sobre o Acesso</h3>
                    <p class="text-[10px] font-bold text-gray-600 uppercase">Informações e Política de Uso</p>
                </div>
            </div>
            <div id="m-desc" class="desc-content whitespace-pre-line font-medium"></div>
        </div>
    </main>

    <script>
        let p, sel = 0;

        async function init() {
            try {
                const response = await fetch('produtos.json');
                const data = await response.json();
                const id = localStorage.getItem('id_selecionado');
                p = data.find(x => x.id == id);

                if(!p) { location.href = 'index.html'; return; }

                document.getElementById('m-titulo').innerText = p.titulo;
                document.getElementById('m-categoria').innerText = p.categoria || "Digital Premium Access";
                document.getElementById('m-desc').innerHTML = p.descricao.replace(/\n/g, '<br>');
                document.getElementById('m-img').src = p.imagem;
                render();
            } catch (e) { console.error("Erro:", e); }
        }

        function render() {
            const vari = p.variacoes[sel];
            const isOutOfStock = vari.estoque <= 0;
            const stockLabel = document.getElementById('m-estoque-topo');
            const stockDot = document.getElementById('stock-dot');
            
            if(isOutOfStock) {
                stockLabel.innerText = "Esgotado";
                stockLabel.className = "text-[10px] font-black text-red-500 uppercase";
                stockDot.className = "w-2 h-2 bg-red-500 rounded-full";
            } else {
                stockLabel.innerText = vari.estoque + " Unidades Disponíveis";
                stockLabel.className = "text-[10px] font-black text-green-500 uppercase";
                stockDot.className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
            }

            document.getElementById('m-preco').innerText = "R$ " + vari.preco.toFixed(2);

            document.getElementById('v-box').innerHTML = p.variacoes.map((v, i) => {
                const esgotado = v.estoque <= 0;
                return `
                <div onclick="${esgotado ? '' : `sel=${i}; render();`}" 
                     class="option-ios p-5 flex justify-between items-center ${sel==i ? 'active' : ''} ${esgotado ? 'disabled' : ''}">
                    <div class="flex items-center gap-4 text-left">
                        <div class="w-5 h-5 rounded-full border border-white/10 flex items-center justify-center bg-white/5">
                            <div class="w-2.5 h-2.5 rounded-full bg-[#1E5BFF] ${sel==i ? 'scale-100' : 'scale-0'} transition-transform duration-300"></div>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[12px] font-black uppercase text-white">${v.nome}</span>
                            <span class="text-[10px] font-black uppercase mt-0.5 ${esgotado ? 'text-red-500' : 'text-green-500'}">
                                ${esgotado ? 'Esgotado' : `${v.estoque} Disponíveis`}
                            </span>
                        </div>
                    </div>
                    <span class="text-sm font-black text-white">R$ ${v.preco.toFixed(2)}</span>
                </div>`;
            }).join('');

            const btnBox = document.getElementById('action-buttons');
            if(isOutOfStock) {
                btnBox.innerHTML = `
                    <button class="md:col-span-3 btn-main btn-disabled py-5 flex items-center justify-center gap-3 w-full">
                        <span class="uppercase font-black tracking-widest text-sm">PRODUTO ESGOTADO</span>
                    </button>
                `;
            } else {
                btnBox.innerHTML = `
                    <button onclick="go(true)" class="md:col-span-2 btn-main py-5 flex items-center justify-center gap-3 w-full">
                        <span class="uppercase font-black tracking-widest text-sm">Comprar Agora</span>
                        <i class="bi bi-arrow-right text-xl"></i>
                    </button>
                    <button onclick="go(false)" class="btn-outline py-5 flex items-center justify-center gap-2 text-[11px] font-black uppercase text-white w-full">
                        <i class="bi bi-cart-plus text-xl text-blue-500"></i> Carrinho
                    </button>
                `;
            }
        }

        function go(direct) {
            // SALVA A VARIAÇÃO ESCOLHIDA PARA O PAGAMENTO.HTML
            localStorage.setItem('variacao_selecionada', sel);
            
            const pedido = { ...p, sel: p.variacoes[sel], qtd: 1 };
            localStorage.setItem('checkout_pedido', JSON.stringify(pedido));

            if(direct) {
                location.href = 'pagamento.html';
            } else {
                // Lógica de carrinho (pode ser expandida)
                alert("Produto adicionado ao carrinho!");
                location.href = 'index.html';
            }
        }

        init();
    </script>
</body>
</html>
